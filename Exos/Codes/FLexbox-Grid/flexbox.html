<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&family=BBH+Sans+Bogle&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/style.css">
    <title>Flexbox and Grid</title>
</head>
<body>
    <header>
        <h1>
            <a href="flexbox.html"> Flexbox </a>
        or
            <a href="grid.html"> Grid </a>
        </h1>
    </header>
    <main class="main-flexbox">
        <h2> Try to change window's width and height </h2>

        <h3> Flexbox 1</h3>
        <div class="box-flexbox1">
            <div class="box">
                <img src="./SRC/cuteKitten.jpeg" alt="Cute Kitten" class="cuteKitten">
            </div>
            <div class="box">
                <img src="./SRC/cuteTiger.jpeg" alt="Cute Tiger" class="cuteTiger">
            </div>
            <div>
                <img src="./SRC/cuteFox.jpeg" alt="Cute Fox" class="cuteFox">
            </div>
        </div>

        <div class="box-flexbox-column">
            <div class="box-flexbox2">
                <div class="box">
                    <img src="./SRC/cutePanda.jpeg" alt="Cute Panda" class="cutePanda">
                </div>
                <div class="box">
                    <img src="./SRC/cuteOtter.jpeg" alt="Cute Otter" class="cuteOtter">
                </div>
                <div class="box">
                    <img src="./SRC/cuteLion.jpeg" alt="Cute Lion" class="cuteLion">
                </div>
                <h3> Flexbox 2</h3>
            </div>
            <div class="box-flexbox3">
                <h3> Flexbox 3</h3>
                <div class="box">
                    <img src="./SRC/cuteRabbit.jpeg" alt="Cute Rabbit" class="cuteRabbit">
                </div>
                <div class="box">
                    <img src="./SRC/cuteTurtle.jpeg" alt="Cute Turtle" class="cuteTurtle">
                </div>
                <div class="box">
                    <img src="./SRC/cuteDog.jpeg" alt="Cute Samoyed" class="cuteDog">
                </div>
                <div class="box">
                    <img src="./SRC/cuteFurret.jpeg" alt="Cute Ferret" class="cuteFerret">
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p> :D Do you like it !? :D </p>
