<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire inscription</title>
</head>
<body>

<!-- Creer un formulaire d'inscription (method post) 
- nom (max 40 chars, type text) 
- prenom (max 30 chars, type text)
- email (max 50 chars, type email)
- mot_de_passe (min 12 chars, max 20 chars, type password) -->

    <form action="#" method="post" autocomplete="off">

        <div>
            <label for="name"> Entrez votre nom </label>
            <input type="text" name="name" required maxlength="40">
        </div>

        <br>

        <div>
            <label for="firstname"> Entrez votre prénom </label>
            <input type="text" name="firstname" required maxlength="30"> 
        </div>

        <br>

        <div>
            <label for="email"> Entrez votre email </label>
            <input type="email" name="email" required maxlength="50">
        </div>

        <br>

        <div>
            <label for="password"> Entrez votre mot de passe </label>
            <input type="password" name="password" required minlength="12" maxlength="20">
        </div>

        <br>

        <button type="submit"> Inscription </button>
    </form>
    <br>

<!-- Creer un formulaire de connexion (method post)
- email (max 50 chars, type email)
- mot_de_passe (min 12 chars, max 20 chars, type password) -->

    <br>
    <form action="#" method="post">

        <div>
            <label for="mail"> Entrez votre email </label>
            <input type="email" name="mail" required maxlength="50">
        </div>

        <div>
            <label for="wordpass"> Entrez votre mot de passe </label>
            <input type="password" name="wordpass" required minlength="12" maxlength="20">
        </div>

        <button type="submit"> Connexion </button>
    </form>
</body>
</html>
