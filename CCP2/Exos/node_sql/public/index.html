<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - DWWM</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; }

        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }

        h2 { 
            color: #2c3e50; 
            text-align: center; 
            margin-bottom: 30px; 
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: #4a90e2; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.3s; 
        }

        button:hover { 
            background: #357abd; 
        }

        .info { 
            text-align: center; 
            font-size: 0.9em; 
            color: #7f8c8d; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Espace Membre</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Identifiant (admin)" required>
            <input type="password" name="password" placeholder="Mot de passe (1234)" required>
            <button type="submit">Se connecter</button>
        </form>
        <div class="info">Testez avec : admin / 1234</div>
    </div>
</body>
</html>
