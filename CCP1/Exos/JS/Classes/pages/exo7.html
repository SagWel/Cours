    <a href="../index.html">Retour à l'acceuil</a>
    <script>
        class MathUtils {
            static addition(a, b) {
                return a + b
            }

            static soustraction (a, b) {
                return a - b
            }

            static aireCercle(rayon) {
                return (rayon * rayon * Math.PI).toFixed(2)
            }
        }

        console.log(MathUtils.addition(5, 3));
        console.log(MathUtils.aireCercle(2));
    </script>
