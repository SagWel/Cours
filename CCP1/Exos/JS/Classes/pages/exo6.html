<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exos Classes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 flex-col gap-2">
    <main class="flex items-center justify-center">
        <div class="mt-4 bg-purple-600 text-white font-bold py-2 px-1 rounded-lg transition-colors text-center">
            <h1 >
                Veuillez ouvrir la console
            </h1>
            <h5>
                F12 ou Ctrl + Shift + I
            </h5>
        </div>
    </main>
    <a href="../index.html">Retour à l'acceuil</a>
    <script>
        class Livre {
            constructor (titre, auteur, disponible) {
                this.titre = titre
                this.auteur = auteur
                this.disponible = disponible
            }
        }

        class Bibliotheque {
            constructor () {
                this.livres = []
            }

            ajouterLivre (Livre) {
                this.livres.push(Livre)
            }

            afficherLivres() {
                console.log(this.livres);                
            }

            emprunter(titre) {
                for (let livre of this.livres) {
                    if (livre.titre == titre) {
                        livre.disponible = false
                        return
                    }
                } 
            }
        }

        const biblio = new Bibliotheque();
        biblio.ajouterLivre(new Livre("1984", "George Orwell", true));
        biblio.ajouterLivre(new Livre("Le Petit Prince", "Antoine de Saint-Exupéry", true));
        biblio.emprunter("1984");
        biblio.afficherLivres();
    </script>
</body>
</html>
