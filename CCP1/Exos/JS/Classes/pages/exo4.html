<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exos Classes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 flex-col gap-2">
    <main class="flex items-center justify-center">
        <div class="mt-4 bg-purple-600 text-white font-bold py-2 px-1 rounded-lg transition-colors text-center">
            <h1 >
                Veuillez ouvrir la console
            </h1>
            <h5>
                F12 ou Ctrl + Shift + I
            </h5>
        </div>
    </main>
    <a href="../index.html">Retour à l'acceuil</a>
    <script>
        class CompteBancaire {
            #solde = 0
            get solde () {
                return this.#solde
            }
            deposer (montant) {
                this.#solde += montant
            }

            retirer(montant) {
                if (this.#solde - montant >= 0) {
                    this.#solde -= montant
                } else {
                    alert("Pas assez de solde sur votre compte");
                }
            }
        }

        const c1 = new CompteBancaire()
        c1.deposer(100)
        c1.retirer(30)
        console.log(c1.solde);
    </script>
</body>
</html>
