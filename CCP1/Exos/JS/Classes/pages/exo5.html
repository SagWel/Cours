<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exos Classes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 flex-col gap-2">
    <main class="flex items-center justify-center">
        <div class="mt-4 bg-purple-600 text-white font-bold py-2 px-1 rounded-lg transition-colors text-center">
            <h1 >
                Veuillez ouvrir la console
            </h1>
            <h5>
                F12 ou Ctrl + Shift + I
            </h5>
        </div>
    </main>
    <a href="../index.html">Retour à l'acceuil</a>
    <script>
        class Forme {
            surface () {
                return "Surface non définie"                
            }
        }
        class Carre extends Forme {
            constructor(cote) {
                super()
                this.cote = cote
            }
            surface () {
                let surface = 4 * this.cote
                return surface
            }
        }
        class Cercle extends Forme {
            constructor(rayon) {
                super()
                this.rayon = rayon
            }
            surface() {
                let surface = this.rayon * this.rayon  * Math.PI
                return surface.toFixed(2)
            }
        }

        const f1 = new Carre(4);
        console.log(f1.surface());

        const f2 = new Cercle(3);
        console.log(f2.surface());
    </script>
</body>
</html>
